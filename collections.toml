# ofa RAG collection configuration
#
# Declarative source-to-collection mapping consumed by
# ``src/rebuild_indices.py``. When you add / update / remove RAG sources,
# edit this file and re-run:
#
#     python3 $OFA_ROOT/src/rebuild_indices.py
#     python3 $OFA_ROOT/src/rebuild_indices.py --collection <name>
#     python3 $OFA_ROOT/src/rebuild_indices.py --dry-run
#     python3 $OFA_ROOT/src/rebuild_indices.py --force
#     python3 $OFA_ROOT/src/rebuild_indices.py --clear --collection X
#     python3 $OFA_ROOT/src/rebuild_indices.py --list
#
# Scope: this file lists the collections whose sources are git-pullable
# repos or PDF drop-folders under $OFA_ROOT/repos/. The OpenFOAM tutorial
# and source-tree collections (``openfoam``, ``of13_src``) are NOT listed
# here because they use special case-dict-aware chunking that lives in
# ``build_index_v2.py`` — use that script to rebuild them.
#
# Path resolution:
#   * Paths starting with "/" are absolute.
#   * All others are resolved relative to $OFA_ROOT.
#   * Missing directories are skipped with a warning, so you can list a
#     source ahead of dropping content into it.
#
# Sources may mix code and PDFs in the same collection — chunks are
# tagged with source_type ("code" or "pdf") in metadata so retrievers /
# prompts can distinguish them.

# ---------------------------------------------------------------------------
# NREL Kestrel HPC docs (git-cloned under repos/HPC).
# ---------------------------------------------------------------------------

[collections.hpc_docs]
description = "NLR Kestrel documentation."
[[collections.hpc_docs.sources]]
path       = "repos/HPC/docs"
type       = "code"
extensions = [".md", ".rst", ".txt"]

# ---------------------------------------------------------------------------
# AMReX source (github.com/amrex-codes/amrex, cloned into repos/amrex).
# ---------------------------------------------------------------------------

[collections.amrex_src]
description = "AMReX core source tree."
[[collections.amrex_src.sources]]
path       = "repos/amrex"
type       = "code"
extensions = [".H", ".cpp", ".h", ".f90"]

# ---------------------------------------------------------------------------
# ReFrame test framework.
# ---------------------------------------------------------------------------

[collections.reframe_src]
description = "ReFrame + universal test framework sources."
[[collections.reframe_src.sources]]
path       = "repos/reframe-universal"
type       = "code"
extensions = [".py", ".sh", ".md"]

# ---------------------------------------------------------------------------
# MARBLES — code + user's thesis + supporting LBM papers.
# Drop PDFs into repos/marbles-papers/ and re-run the rebuild.
# ---------------------------------------------------------------------------

[collections.marbles_src]
description = "MARBLES LBM thermal solver — source code plus indexed papers/thesis."
[[collections.marbles_src.sources]]
path       = "repos/marblesThermal"
type       = "code"
extensions = [".H", ".cpp", ".h", ".py"]
[[collections.marbles_src.sources]]
path         = "repos/marbles-papers"
type         = "pdf"
keep_missing = true   # source PDFs may be stripped from disk after ingestion;
                      # protect their chunks from the orphan sweep even when
                      # the code source(s) above are pruned normally.

# ---------------------------------------------------------------------------
# Quantum computing. Drop code repos into repos/quantum-code/ and PDFs
# (textbooks, papers, notes) into repos/quantum-papers/, then rebuild.
# ---------------------------------------------------------------------------

[collections.quantum_computing]
description = "Quantum computing — curated code repositories, textbooks, and papers."
[[collections.quantum_computing.sources]]
path       = "repos/quantum-code"
type       = "code"
extensions = [".py", ".cpp", ".h", ".ipynb", ".md"]
[[collections.quantum_computing.sources]]
path         = "repos/quantum-papers"
type         = "pdf"
keep_missing = true   # see marbles-papers above.
# Per-file page ranges: filename (relative to `path` above) -> range spec.
# Accepted forms: integer, "N", "N-", "-M", "N-M", or [N, M] (0/null = end).
# Use to skip front-matter / unrelated chapters of a large textbook.
page_ranges  = { "TheLatticeBoltzmannEquationForComplexStatesOfFlowingMatter_succiLatticeBoltzmannEquation2018a.pdf" = "646-" }

# ---------------------------------------------------------------------------
# VASP — general notes, Rosen-group tutorials (I/O files, SEEKPATH,
# transition-state search, visualization), and the Wisconsin VASP docs
# snapshot. Small text-only corpus; the authoritative HPC build/module
# doc is pinned separately (Applications/vasp.md via retrieve_vasp_context).
# ---------------------------------------------------------------------------

[collections.vasp_src]
description = "VASP — tutorials, general notes, and vendored docs snapshots."
[[collections.vasp_src.sources]]
path       = "repos/vasp"
type       = "code"
extensions = [".md", ".txt"]

