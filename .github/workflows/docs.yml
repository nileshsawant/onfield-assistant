name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**'
      - 'README.md'
      - 'ARCHITECTURE.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Minimum permissions for the pages deployment. Read for checkout; the
# `pages` + `id-token` scopes are required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys in parallel — GitHub Pages only accepts
# one publish at a time. cancel-in-progress=false so a superseded run
# gets to finish gracefully rather than being torn down mid-upload.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: docs/requirements-docs.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Build with Sphinx
        # --keep-going: don't bail on the first warning (docstrings are
        # informal in places). Once the codebase has cleaner
        # docstrings, switch to `-W --keep-going` to make warnings
        # errors.
        run: sphinx-build -b html --keep-going docs docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy on pushes to main. PR builds validate the site
    # renders but never overwrite the live pages.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
